name: Update Star History

on:
  push:
    paths:
      - ".github/workflows/update-star-history.yml"
      - "scripts/generate-star-history.mjs"
      - "README.md"
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/generate-star-history.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Commit updated chart
        run: |
          git diff --quiet -- assets/star-history.svg || {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add assets/star-history.svg
            git commit -m "chore: update star history"
            git push
          }
